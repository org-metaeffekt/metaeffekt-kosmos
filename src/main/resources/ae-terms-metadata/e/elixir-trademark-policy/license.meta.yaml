canonicalName: Elixir Team Trademarks Policy
category: Elixir Team Trademarks Policy
shortName: Elixir-Trademark-Policy

otherIds:
  - "scancode:elixir-trademark-policy"

alternativeNames:
  - "Elixir Team Trademarks Policy"
  - "ELIXIR TEAM TRADEMARKS POLICY"

evidence:
  matches:
    - "“Elixir” and the Elixir logo are registered trademarks of the Elixir Team"
    - "The Elixir Team believes in a decentralized approach to growing the community and
       the ecosystem, independent of the Elixir project and the Elixir Team"
    - "Anyone can use the Elixir trademarks if that use of the trademark is nominative"
    - "The trademarks must not be used to disparage the project and its community, nor
       be used in any way to imply ownership, endorsement, or association with the
       Elixir project and the Elixir Team"
    - "You must not visually combine the Elixir logo with any other images, or change
       the logo in any way other than ways required by printing restrictions"
    - "If you want to create your own visual identity in relation to Elixir, you might
       use the shape of an unrelated “water drop” as part of your design, as seen in many
       community projects and initiatives"
    - "You must not combine or modify the Elixir logo"
    - "The Elixir logo is available in our repository in both vertical and horizontal
       versions"
    - "The product or service in question must be one not readily identifiable without
       use of the trademark"
    - "Only so much of the mark or marks may be used as is reasonably necessary to
       identify the product or service"
    - "The organization using the mark must do nothing that would, in conjunction with
       the mark, suggest sponsorship or endorsement by the trademark holder"
    - "Our trademarks must be used to refer to the Elixir programming language"
    - "Usage of the Elixir logo to say a technology is “powered by Elixir” under nominative use"
    - "Linking back to the Elixir website, if possible, is appreciated"
    - "Usage of the Elixir logo to display it as a supported technology in a service or platform"
    - "For instance, you may say “we support Elixir” and use the Elixir logo, but you may not refer to
       yourself as “the Elixir platform” nor imply any form of endorsement or association with Elixir"
    - "Usage of the Elixir logo in non-commercial community meetups, in presentations, and in courses when
       referring to the language and its ecosystem under nominative use"
    - "Usage of the Elixir logo in non-commercial swag (stickers, t-shirts, mugs, etc) to promote the
       Elixir programming language"
    - "The Elixir marks must be the only marks featured in the product"
    - "You need permission to make swag that include Elixir and other third party marks in them"
    - "Inclusion of the Elixir logo in non-commercial icon sets"
    - "Use of the Elixir icons must still adhere to Elixir’s trademark policies"
    - "Here is a non-exhaustive list of non permitted uses of the marks"
    - "Usage of the Elixir logo in book covers, conferences, and podcasts"
    - "Usage of the Elixir logo as the mark of third party projects, even in combination with other marks"