evidence:
  matches:
    - "Subject to the following terms, Red Hat, Inc. (“Red Hat”) grants to you a perpetual, worldwide license to
       the Programs (each of which may include multiple software components)"
    - "With the exception of certain image files identified in Section 2 below, each software component is governed
       by a license located in the software component’s source code that permits you to run, copy, modify, and
       redistribute (subject to certain obligations in some cases) the software component"
    - "This EULA pertains solely to the Programs and does not limit your rights under, or grant you rights that
       supersede, the license terms applicable to any particular component"
  excludes:
    - "Red Hat, Inc. (“Red Hat”) grants to you a perpetual, worldwide license to the Programs (each of which may
       include multiple software components) pursuant to the GNU Lesser General Public License v. 2.1
       (https://www.gnu.org/licenses/old-licenses/lgpl-2.1.en.html)"