canonicalName: GNU Lesser or Library General Public License (undefined)
category: LGPL
shortName: LGPL-?

defaultSourceCategory: annex

unspecific: true

# NOTE: we differentiate LesserGPL and LibraryGPL; both a subcategories of LGPL
subcategories:
  - LesserGPL
  - LibraryGPL

# FIXME-KKL: this should not be required
combinedWith:
  "GNU Lesser General Public License 3.0": "GNU Lesser General Public License 3.0"
  "GNU Lesser General Public License 2.1": "GNU Lesser General Public License 2.1"
  "GNU Library General Public License 2.0": "GNU Library General Public License 2.0"
  "GNU Lesser General Public License 3.0 (or any later version)": "GNU Lesser General Public License 3.0 (or any later version)"
  "GNU Lesser General Public License 2.1 (or any later version)": "GNU Lesser General Public License 2.1 (or any later version)"
  "GNU Library General Public License 2.0 (or any later version)": "GNU Library General Public License 2.0 (or any later version)"

alternativeNames:
  - "GNU LGPL"
  - "Gnu LGPL"
  - "LGPL"
  - "LGPL License"
  - "LGPL open source license"
  - "GNU General Public License (LGPL)"
  - "licensed under LGPL and"

# needed for evidence (or excludes) shorter than 3 words:
expressiveEvidence: true

# MASKS USE CASE: explanatory, but non-binding association
masks:
  matches:
    - "The implementation is inspired by terralib http://www.terralib.org (LGPL)"
    - "the complete text of the GNU Lesser General Public License can be found in usr share commonlicenses LGPL"
