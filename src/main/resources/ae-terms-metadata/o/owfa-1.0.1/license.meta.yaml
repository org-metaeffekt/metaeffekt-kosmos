      was in response to a corresponding suit first brought against you"
    - "This promise is not an assurance"
    - "that any of my copyrights or issued patent claims cover an implementation of the Specification or are 
      enforceable"
    - "Except as specifically set forth in this Agreement, no other express or implied patent, trademark, copyright, 
      or other property rights are granted under this Agreement, including by implication, waiver, or estoppel"
