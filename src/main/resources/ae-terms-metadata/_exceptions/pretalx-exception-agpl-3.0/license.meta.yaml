canonicalName: pretalx Exception (AGPL-3.0)
category: pretalx Exception
shortName: pretalx-Exception-AGPL-3.0

type: exception

otherIds:
  - "scancode:pretalx-exception-3.0"

combinedWith:
  "GNU Affero General Public License 3.0": GNU Affero General Public License 3.0 (with pretalx Exception (AGPL-3.0))

displayName: "GNU Affero General Public License 3.0 (with pretalx Exception)"

expectedMatches:
  - "Apache License 2.0"
  - "Creative Commons BY-SA 4.0"

alternativeNames:
  - "pretalx exception to AGPL-3.0"

evidence:
  matches:
    - "You are permitted to use pretalx or combined or modified versions of pretalx without respecting GNU AGPL section 13
     (Remote Network Interaction) as long as you follow all of the additional terms in this document and do NOT use
     pretalx for any of the following purposes"
    - "Making the functionality of pretalx available to third parties as a service"
    - "Offering a service the value of which entirely or primarily derives from the value of pretalx or the
       combined or modified version of pretalx"
    - "Offering a service that accomplishes for users the primary purpose of pretalx or the combined or modified
       version of pretalx"
    - "you are not allowed to remove the attribution notice indicating the generated
      website is built using pretalx at the bottom of all generated web pages"
    - "if you distribute a modified version in source or binary form, or if you offer
     usage of a modified version to third parties (SaaS), it is important to be clear about what kind of modifications
     the distributed work contains"

references:
  "AGPL":
    matches:
      - "pretalx is licensed under the GNU Affero General Public License, version 3.0 as published by the Free Software
        Foundation, Inc. (AGPLv3), which is included next to this file as AGPL-3.0-only.txt"
      - "Pursuant to AGPLv3, Section 7 (b), you are not allowed to remove the attribution notice indicating the generated
        website is built using pretalx at the bottom of all generated web pages"
      - "Pursuant to AGPLv3, Section 7 (c), if you distribute a modified version in source or binary form, or if you offer
       usage of a modified version to third parties (SaaS), it is important to be clear about what kind of modifications
       the distributed work contains"
      - "As special exceptions the Additional Terms on the work licensed herein, pursuant to Section 7 of Affero General
        Public License are as follows:
        
        1. You are permitted to use pretalx or combined or modified versions of pretalx without respecting GNU AGPL section 13"

segmentation:
  revert: [
    {
      match:
        "Licensing of pretalx",
      matchNext:
        "pretalx is licensed under the GNU Affero General Public License, version 3.0 as published by the Free Software Foundation"
    },
]
