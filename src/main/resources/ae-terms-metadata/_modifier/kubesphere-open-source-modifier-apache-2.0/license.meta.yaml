canonicalName: KubeSphere Open Source Modifier (Apache-2.0)
category: KubeSphere Open Source Modifier
shortName: KubeSphere-OS-Modifier-Apache-2.0

canonicalNameHistory:
  - "KubeSphere Open Source Modifier (Apache 2.0)"

otherIds:
  - "scancode:kubesphere-osl-2024"

type: modifier

classification: restriction

combinedWith:
  Apache License 2.0: Apache License 2.0 (with KubeSphere Open Source Modifier (Apache-2.0))

evidence:
  matches:
    - "KubeSphere is licensed under the Apache License 2.0, with the following additional conditions"
    - "You are permitted to use KubeSphere for your own applications or projects as backend services, and you have the 
      freedom to modify or extend the source code"
    - "However, explicit permission or a commercial license from the producer is required for the following scenarios"
    - "Commercial use (Offering On-Premises or Cloud-based products or services to third parties) including using 
      KubeSphere as a standalone commercial product, integrating it into your commercial products, or 
      distributing it to third parties"
    - "Removing or altering KubeSphere's logo or name"
    - "These additional conditions apply exclusively to KubeSphere version 4.x and all future versions"
    - "Apart from these additional conditions, all other rights and restrictions are governed by the Apache License 2.0"

references: 
  "Apache License":
    matches:
      - "# KubeSphere Open Source License

      KubeSphere is licensed under the Apache License 2.0, with the following additional conditions:"
      - "These additional conditions apply exclusively to KubeSphere version 4.x and all future versions. Versions 3.4.x and earlier are not included under these terms and continue to be governed by their previous licenses.

      Apart from these additional conditions, all other rights and restrictions are governed by the Apache License 2.0, available at http://www.apache.org/licenses/LICENSE-2.0."
      - "Copyright 2024 the KubeSphere Authors.
        
        Licensed under the Apache License, Version 2.0 (the \"License\");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at
        
            http://www.apache.org/licenses/LICENSE-2.0
        
        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an \"AS IS\" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License."

segmentation:
  revert: [
    { match:
        "KubeSphere Open Source License",
      matchNext:
        "KubeSphere is licensed under the Apache License 2.0, with the following additional conditions: 1. You are permitted to use KubeSphere for your own applications or projects as backend services, and you have the freedom to modify or extend the source code"
    },
    { match:
        "These additional conditions apply exclusively to KubeSphere version 4.x and all future versions. Versions 3.4.x and earlier are not included under these terms and continue to be governed by their previous licenses. Apart from these additional conditions, all other rights and restrictions are governed by the Apache License 2.0, available at http://www.apache.org/licenses/LICENSE-2.0.",
      matchNext:
        "Copyright 2024 the KubeSphere Authors. Licensed under the Apache License, Version 2.0 (the \"License\"); you may not use this file except in compliance with the License. You may obtain a copy of the License at http://www.apache.org/licenses/LICENSE-2.0 Unless required by applicable law or agreed to in writing, software distributed under the License is distributed on an \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied. See the License for the specific language governing permissions and limitations under the License."
    },
