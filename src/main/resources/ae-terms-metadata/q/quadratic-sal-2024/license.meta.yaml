segmentation:
  revert: [
    {
      match:
        "Quadratic Source Available License ",
      matchNext:
        "THIS SUMMARY PROVIDES"
    },
    {
      match:
        "Summary",
      matchNext:
        "You are free to do the following:"
    },
    {
      match:
        "1. Acceptance",
      matchNext:
        "This Software License Agreement"
    },
    {
      match:
        "2. DEFINITIONS",
      matchNext:
        "“Derivatives” means material"
    },
    {
      match:
        "3. SCOPE",
      matchNext:
        "3.1 License grant."
    },
    {
      match:
        "4.  INTELLECTUAL PROPERTY",
      matchNext:
        "4.1  Limited License."
    },
    {
      match:
        "5.  DISCLAIMER OF WARRANTIES AND LIMITATION OF LIABILITY",
      matchNext:
        "5.1  DISCLAIMER.."
    },
    {
      match:
        "6.  TERM AND TERMINATION",
      matchNext:
        "6.1  Term."
    }
  ]