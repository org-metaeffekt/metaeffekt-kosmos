# FIXME-CONCEPT: we wanted to use oneOf evidences here instead of alternativeNames. Using oneOf evidences here causes a lot of issues (for now oneOf matches only really work for markers):
# while matches due to alternativeNames can be undone with references, matches that occur due to oneOf evidences cannot be undone with references - meaning that excludes have to be used which are way to radical. If the public domain is only mentioned in one part of the license and then later in that license something is really placed under the public domain we cannot accurately map that.
# due to how the matching works we would need to add DOZENS of excludes just to fix all the mismatches - which then may exclude a lot of licenses that actually contain a Public domain, just because we needed to exclude many phrases
# changes in the code or conceptual adaption required

evidence:
