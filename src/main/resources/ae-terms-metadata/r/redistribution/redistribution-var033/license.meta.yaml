canonicalName: Redistribution Terms (variant 033)
category: RT
shortName: RT-Var033

otherIds:
  - "scancode:bsd-endorsement-allowed"

canonicalNameHistory:
  - "BSD 3-Clause License Var018"
  - "BSD 3-Clause License (variant 018)"

representedAs: "Redistribution Terms"
displayName: "Redistribution terms (no liability; no warranty)"

requiresCopyright: true
requiresLicenseText: true

#notice: this seems like a typical BSD 3-Clause at first glance - but instead of "may not be used to endorse or promote" license text states "may be used to endorse or promote" - this is the reason why we will not classify this as a BSD 3-Clause

evidence:
  matches:
    - "Redistribution and use in source and binary form* with or without
       modification, are permitted provided that the following conditions are met"
    - "Redistributions of source code must retain the above copyright notice,
       this list of conditions and the following disclaimer"
    - "Redistributions in binary form must reproduce the above copyright
       notice, this list of conditions and the following disclaimer in the
       documentation and/or other materials provided with the distribution"
    - "The name*{.{0,120}}* may be used to endorse or promote products
       derived from this software without specific prior written permission"
    - "THIS SOFTWARE IS PROVIDED BY *{.{0,120}}*``AS IS'' AND ANY EXPRESS OR IMPLIED
       WARRANTIES, INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES OF
       MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED"
    - "IN NO EVENT SHALL *{.{0,120}}*BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL,
       SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES (INCLUDING, BUT NOT LIMITED TO,
       PROCUREMENT OF SUBSTITUTE GOODS OR SERVICES; LOSS OF USE, DATA, OR PROFITS;
       OR BUSINESS INTERRUPTION) HOWEVER CAUSED AND ON ANY THEORY OF LIABILITY,
       WHETHER IN CONTRACT, STRICT LIABILITY, OR TORT (INCLUDING NEGLIGENCE OR
       OTHERWISE) ARISING IN ANY WAY OUT OF THE USE OF THIS SOFTWARE, EVEN IF
       ADVISED OF THE POSSIBILITY OF SUCH DAMAGE"
  excludes:
    - "Neither *{.{0,220}}*may be used"

licenseTemplate:
    "<lq>Redistribution and use in source and binary forms, with or without
     modification, are permitted provided that the following conditions are met:
     <ol><li>Redistributions of source code must retain the above copyright notice,
        this list of conditions and the following disclaimer.</li>
     <li>Redistributions in binary form must reproduce the above copyright
        notice, this list of conditions and the following disclaimer in the
        documentation and/or other materials provided with the distribution.</li>
     <li>The name{{variable3rdClause}} may be used to endorse or promote products
        derived from this software without specific prior written permission.</li></ol>
     <codeph>THIS SOFTWARE IS PROVIDED BY {{authorNoWarranty}} ``AS IS'' AND ANY EXPRESS OR IMPLIED
     WARRANTIES, INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES OF
     MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED. IN NO
     EVENT SHALL {{authorNoLiability}} BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL,
     SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES (INCLUDING, BUT NOT LIMITED TO,
     PROCUREMENT OF SUBSTITUTE GOODS OR SERVICES; LOSS OF USE, DATA, OR PROFITS;
     OR BUSINESS INTERRUPTION) HOWEVER CAUSED AND ON ANY THEORY OF LIABILITY,
     WHETHER IN CONTRACT, STRICT LIABILITY, OR TORT (INCLUDING NEGLIGENCE OR
     OTHERWISE) ARISING IN ANY WAY OUT OF THE USE OF THIS SOFTWARE, EVEN IF
     ADVISED OF THE POSSIBILITY OF SUCH DAMAGE.</codeph></lq>"
