evidence:
  matches:
    - "This software and associated files (the “Software”) can only be used (executed, modified, executed after
       modifications) with a valid Odoo Enterprise Subscription for the correct number of users"
    - "With a valid Partnership Agreement with Odoo S.A., the above permissions are also granted, as long as the
       usage is limited to a testing or development environment"
    - "You may develop Odoo modules based on the Software and distribute them under the license of your choice,
       provided that it is compatible with the terms of the Odoo Enterprise Edition License (For example:
       LGPL, MIT, or proprietary licenses similar to this one)"
    - "You may use Odoo modules published under any license along with the Software, provided that their license
       is compatible with the terms of the Odoo Enterprise License (Including, but not limited to, any module
       published on the Odoo Apps Store on odoo.com/apps)"
    - "It is forbidden to publish, distribute, sublicense, or sell copies of the Software or modified copies
       of the Software"
    - "The above copyright notice and this permission notice must be included in all copies or substantial
       portions of the Software"

references:
  "LGPL":
    matches:
      - "it is compatible with the terms of the Odoo Enterprise Edition License (For example:
         LGPL, MIT, or proprietary licenses similar to this one)"
  "MIT":
    matches:
      - "it is compatible with the terms of the Odoo Enterprise Edition License (For example:
         LGPL, MIT, or proprietary licenses similar to this one)"